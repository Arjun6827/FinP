<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            background: linear-gradient(135deg, #f7f9fb 0%, #eceef0 100%);

<body class="bg-background text-on-background min-h-screen flex items-center justify-center p-margin-mobile md:p-margin-desktop font-body-md">
<!-- Login Container -->
<main class="w-full max-w-[440px] flex flex-col items-center">
<!-- Brand Identity -->
<div class="mb-xl text-center">
<div class="flex items-center justify-center mb-sm">
<span class="material-symbols-outlined text-primary text-[40px]" data-icon="account_balance">account_balance</span>
</div>
<h1 class="font-headline-lg text-headline-lg text-on-surface tracking-tight">FinPilot</h1>
<p class="font-body-md text-body-md text-on-surface-variant mt-xs">AI Financial Partner</p>
</div>
<!-- Auth Card -->
<div class="w-full bg-surface-container-lowest border border-outline-variant rounded-xl p-lg md:p-xl shadow-sm">
<header class="mb-lg">
<h2 class="font-headline-sm text-headline-sm text-on-surface">Sign In</h2>
<p class="font-body-sm text-body-sm text-on-surface-variant mt-xs">Enter your credentials to access your dashboard</p>
</header>
<form class="space-y-lg">
<!-- Email Field -->
<div class="flex flex-col gap-xs">
<label class="font-body-sm text-body-sm font-bold text-on-surface" for="email">Email Address</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-md top-1/2 -translate-y-1/2 text-outline" data-icon="mail">mail</span>
<input class="w-full pl-xl pr-md py-sm bg-surface border border-outline-variant rounded focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all font-body-md text-on-surface" id="email" name="email" placeholder="name@company.com" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="flex flex-col gap-xs">
<div class="flex justify-between items-center">
<label class="font-body-sm text-body-sm font-bold text-on-surface" for="password">Password</label>
<a class="font-body-sm text-body-sm text-primary hover:underline transition-colors" href="#">Forgot password?</a>
</div>
<div class="relative">
<span class="material-symbols-outlined absolute left-md top-1/2 -translate-y-1/2 text-outline" data-icon="lock">lock</span>
<input class="w-full pl-xl pr-xl py-sm bg-surface border border-outline-variant rounded focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all font-body-md text-on-surface" id="password" name="password" placeholder="••••••••" type="password"/>
<button class="absolute right-md top-1/2 -translate-y-1/2 text-outline hover:text-on-surface transition-colors" type="button">
<span class="material-symbols-outlined" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<!-- Remember Me & State -->
<div class="flex items-center">
<input class="w-4 h-4 text-primary border-outline-variant rounded focus:ring-primary focus:ring-offset-0" id="remember" name="remember" type="checkbox"/>
<label class="ml-sm font-body-sm text-body-sm text-on-surface-variant cursor-pointer" for="remember">Keep me logged in</label>
</div>
<!-- Submit Button -->
<button class="w-full py-md bg-primary text-on-primary font-body-md font-bold rounded-lg hover:bg-primary-container transition-all shadow-sm active:scale-[0.98]" type="submit">
                    Sign In
                </button>
</form>
<!-- Secondary Actions -->
<div class="mt-xl pt-lg border-t border-outline-variant text-center">
<p class="font-body-sm text-body-sm text-on-surface-variant">
                    Don't have an account? 
                    <a class="text-primary font-bold hover:underline transition-colors ml-xs" href="#">Create an account</a>
</p>
</div>
</div>
<!-- Footer Info -->
<footer class="mt-lg flex flex-col items-center gap-sm">
<div class="flex items-center gap-md">
<a class="font-label-caps text-label-caps text-on-surface-variant hover:text-primary transition-colors" href="#">Privacy Policy</a>
<span class="w-1 h-1 bg-outline-variant rounded-full"></span>
<a class="font-label-caps text-label-caps text-on-surface-variant hover:text-primary transition-colors" href="#">Terms of Service</a>
<span class="w-1 h-1 bg-outline-variant rounded-full"></span>
<a class="font-label-caps text-label-caps text-on-surface-variant hover:text-primary transition-colors" href="#">Security</a>
</div>
<div class="flex items-center gap-xs text-outline font-body-sm">
<span class="material-symbols-outlined text-[16px]" data-icon="verified_user">verified_user</span>
<span class="text-[11px] uppercase tracking-widest font-bold">Bank-Grade Encryption</span>
</div>
</footer>
</main>
<!-- Background Abstract Elements -->
<div class="fixed inset-0 -z-10 overflow-hidden pointer-events-none">
<div class="absolute -top-[10%] -left-[10%] w-[40%] h-[40%] bg-primary/5 rounded-full blur-[120px]"></div>
<div class="absolute -bottom-[10%] -right-[10%] w-[40%] h-[40%] bg-secondary-container/10 rounded-full blur-[120px]"></div>
<!-- Illustration/Mood Image -->
<div class="absolute bottom-margin-desktop left-margin-desktop hidden lg:block opacity-40">
<div class="w-64 h-64 border border-outline-variant rounded-xl overflow-hidden grayscale">

</div>
</div>
</div>
